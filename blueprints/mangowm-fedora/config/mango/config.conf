# More option see https://github.com/DreamMaoMao/mango/wiki/
# cursor size
cursor_size=24
cursor_theme=clean-light
env=XCURSOR_SIZE,24
env=XCURSOR_THEME,clean-light

# monitor
# monitorrule=NAME,PROPORTION,GAPS,LAYOUT,X,Y,WIDTH,HEIGHT,REFRESH_RATE
monitorrule=name:DP-1,width:2560,height:1440,refresh:120,x:0,y:0,scale:1

# fcitx5 im
env=GTK_IM_MODULE,fcitx
env=QT_IM_MODULE,fcitx
env=SDL_IM_MODULE,fcitx
env=XMODIFIERS,@im=fcitx
env=GLFW_IM_MODULE,ibus

# scale factor about qt (herr is 1.4)
env=QT_QPA_PLATFORMTHEME,qt5ct
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_QPA_PLATFORM,Wayland;xcb
env=QT_WAYLAND_FORCE_DPI,140

env=PATH,/usr/local/bin:/usr/bin:/bin
env=WAYLAND_DISPLAY,wayland-1
env=XDG_SESSION_TYPE,wayland

## Keybinds ###
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none
# reload config
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,p,spawn,wlogout

# Apps
bind=SUPER,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun -show-icons
bind=SUPER,T,spawn,foot
bind=SUPER,W,spawn,firefox
bind=SUPER,e,spawn,thunar
bind=SUPER+Shift,w,spawn,waypaper
bind=SUPER+Shift+Ctrl,l,spawn,swaylock
bind=SUPER+SHIFT,d,spawn,~/.config/mango/scripts/layout-menu.sh

# screenshotting
bind=NONE,Print,spawn,~/.config/mango/scripts/screenshot.sh copy
bind=SHIFT,Print,spawn,~/.config/mango/scripts/screenshot.sh area
bind=CTRL,Print,spawn,~/.config/mango/scripts/screenshot.sh monitor
bind=ALT,Print,spawn,~/.config/mango/scripts/screenshot.sh all

# Universal Copy/Paste/Clipboard
bind=SUPER,c,spawn,~/.config/mango/scripts/universal-clipboard.sh copy
bind=SUPER,v,spawn,~/.config/mango/scripts/universal-clipboard.sh paste
bind=SUPER+SHIFT,v,spawn,~/.config/mango/scripts/universal-clipboard.sh menu

# window management
bind=SUPER,q,killclient
bind=SUPER+SHIFT,m,quit
bind=SUPER,f,togglefullscreen
bind=SUPER,d,togglefloating

# movement (hjkl or arrow key)
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# switch window focus
bind=SUPER,Tab,focusstack,next

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# swap window (hjkl)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview, # show overview
bind=ALT,a,togglemaximizescreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,Return,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
#bind=CTRL,Left,viewtoleft_have_client,0
#bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER,Right,viewtoright,0
bind=ALT+SUPER,Left,tagtoleft,0
bind=ALT+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
#bind=ALT+SHIFT,X,incgaps,1
#bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=SUPER+CTRL+SHIFT,Up,movewin,+0,-50
bind=SUPER+CTRL+SHIFT,Down,movewin,+0,+50
bind=SUPER+CTRL+SHIFT,Left,movewin,-50,+0
bind=SUPER+CTRL+SHIFT,Right,movewin,+50,+0

# resizewin (in the same layout-style, not like movewin)
bind=CTRL+SUPER,Up,resizewin,+0,-50
bind=CTRL+SUPER,Down,resizewin,+0,+50
bind=CTRL+SUPER,Left,resizewin,-50,+0
bind=CTRL+SUPER,Right,resizewin,+50,+0
bind=CTRL+SUPER,k,resizewin,+0,-50
bind=CTRL+SUPER,j,resizewin,+0,+50
bind=CTRL+SUPER,h,resizewin,-50,+0
bind=CTRL+SUPER,l,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
#mousebind=,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER,btn_left,toggleoverview,1
#mousebind=NONE,btn_right,killclient,0


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

### Multimedia ###
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 2.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Microphone mute toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle mute

# Media playback
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# Brightness (requires brightnessctl)
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 10%-


### Window effect ###
blur=1
blur_layer=0
blur_optimized=0
blur_params_num_passes=2
blur_params_radius=6
blur_params_noise=0
blur_params_brightness=1
blur_params_contrast=1
blur_params_saturation=1

shadows=0
layer_shadows=0
shadow_only_floating=0
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000aa

border_radius=4
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=0.93

### Animation Configuration(support type:zoom,slide) ###
# tag_animation_direction: 0-horizontal,1-vertical
animations=1

animation_type_open=zoom
animation_duration_open=1000
animation_curve_open=0,0.85,0.3,1

animation_type_close=zoom
animation_duration_close=500
animation_curve_close=0,0,0.2,1

zoom_initial_ratio=0.00
zoom_end_ratio=0.00


# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1
center_when_single_stack=1

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1

focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

### Input ###
repeat_rate=25
repeat_delay=350
numlockon=1
xkb_rules_layout=de
#xkb_rules_variant=,
xkb_rules_options=grp:alt_space_toggle
sloppyfocus=1
warpcursor=1
tap_to_click=1
disable_while_typing=1

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0

left_handed=0
middle_button_emulation=1
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0
### Appearance ###
gappih=4
gappiv=4
gappoh=8
gappov=8
borderpx=4
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# Nord
rootcolor=0x2e3440ff
bordercolor=0x4c566aff
focuscolor=0x5e81acff
urgentcolor=0xbf616aff
globalcolor=0x88c0d0ff
scratchpadcolor=0x3b4252ff
overlaycolor=0x5e81acff
maximizescreencolor=0x88c0d0ff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:center_tile
tagrule=id:2,layout_name:center_tile
tagrule=id:3,layout_name:center_tile
tagrule=id:4,layout_name:center_tile
tagrule=id:5,layout_name:center_tile
tagrule=id:6,layout_name:center_tile
tagrule=id:7,layout_name:center_tile
tagrule=id:8,layout_name:center_tile
tagrule=id:9,layout_name:center_tile

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
layerrule=layer_name:rofi,animation_type_open:zoom,animation_type_close:fade

### windowrule ###

windowrule=isfloating:1,isnoshadow:1,ignore_maximize:1,ignore_minimize:1,width:480,height:270,appid:firefox,title:Picture-in-Picture

windowrule=isfloating:1,appid:firefox,title:^(Save|Open|Export)
windowrule=isfloating:1,title:^(Open File|Save File|Preferences|Properties|About)

windowrule=isfloating:1,width:900,height:700,appid:pavucontrol
# Bluetooth
windowrule=isfloating:1,width:700,height:500,appid:blueman-manager

windowrule=isfloating:1,width:900,height:600,appid:nm-connection-editor
windowrule=isfloating:1,width:900,height:600,title:^(nmtui)

windowrule=isfloating:1,width:800,height:600,appid:qt5ct
windowrule=isfloating:1,width:800,height:600,appid:lxappearance

windowrule=isfloating:1,width:800,height:600,appid:nwg-look

windowrule=isfloating:1,width:400,height:400,appid:gnome-calculator

windowrule=offsetx:0,offsety:0,isfloating:1,appid:waypaper

# auto float
#windowrule=isfloating:1,appid:.*

### autostart.sh ###
exec-once = bash ~/.config/mango/autostart.sh
